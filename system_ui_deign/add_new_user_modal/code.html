<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New User - JUKAM Dairy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#5c4300",
              "on-error": "#ffffff",
              "secondary-container": "#fec330",
              "outline-variant": "#bfcaba",

              "surface-container": "#eeeee9",
              "on-primary-fixed-variant": "#0c5216",
              "on-primary": "#ffffff",
              "tertiary": "#1d622b",
              "on-secondary": "#ffffff",
              "tertiary-container": "#387b41",
              "on-primary-fixed": "#002203",
              "on-surface-variant": "#40493d",
              "primary-fixed-dim": "#91d78a",
              "primary-container": "#3a7b3a",
              "on-background": "#1a1c19",
              "on-tertiary-container": "#c7ffc5",
              "surface-container-low": "#f4f4ef",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "surface-bright": "#fafaf5",
              "primary-fixed": "#acf4a4",
              "secondary-fixed": "#ffdfa0",
              "on-secondary-fixed": "#261a00",
              "inverse-primary": "#91d78a",
              "on-tertiary-fixed": "#002107",
              "on-secondary-container": "#6f5100",
              "surface-container-high": "#e8e8e3",
              "surface-variant": "#e3e3de",
              "on-primary-container": "#cbffc2",
              "on-surface": "#1a1c19",
              "surface-tint": "#2a6b2c",
              "tertiary-fixed": "#abf4ac",
              "outline": "#707a6c",
              "inverse-on-surface": "#f1f1ec",
              "secondary-fixed-dim": "#f8bd2a",
              "secondary": "#795900",
              "surface": "#fafaf5",
              "primary": "#206223",
              "error": "#ba1a1a",
              "surface-container-highest": "#e3e3de",
              "on-tertiary-fixed-variant": "#07521d",
              "on-tertiary": "#ffffff",
              "on-error-container": "#93000a",
              "surface-dim": "#dadad5",
              "background": "#fafaf5",
              "inverse-surface": "#2f312e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Work Sans"],
              "label": ["Work Sans"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-bg {
            background: rgba(250, 250, 245, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface overflow-hidden">
<!-- Blurred Background Context (Users Manager Screen Simulation) -->
<div class="fixed inset-0 z-0 blur-md opacity-40 pointer-events-none p-8">
<header class="flex justify-between items-center mb-12">
<h1 class="text-4xl font-headline font-bold tracking-tight text-primary">Personnel</h1>
<div class="w-12 h-12 rounded-full bg-surface-container-highest"></div>
</header>
<div class="grid grid-cols-12 gap-6">
<div class="col-span-3 h-64 bg-surface-container-low rounded-xl"></div>
<div class="col-span-9 h-[600px] bg-surface-container-lowest shadow-sm rounded-xl"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-on-surface/20 backdrop-blur-sm px-4">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-4xl rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[560px]">
<!-- Left Column: Branding/Imagery -->
<div class="relative w-full md:w-5/12 bg-primary overflow-hidden">
<img class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-overlay" data-alt="A smiling farm manager standing in a sunlit dairy pasture with cows grazing peacefully in the soft-focus background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-1JYD5Q2sbQTCk73oW9VWbDsEFsfU_-I04u0hWO22hDNEFlKdNE4x4yGu8hGm865hG3Q6cZWnii8JDq_vV5J3qLWnRQG3yMmYEcGe8RBb5A9i_pzdQ9s6nzRHZ8cEOa_mXBmDppcNYPbxkFmsIOo1lq4_gC74wdg26wrRW-5n3wm_K7LK-Ne8ZDcLbRSphsuQxKEr0D0tCEBQVBEkam5dQKA5eUx769Pd85iIYYJml9ppuV9XuHgnHBVGR5DYQvF1Td8Ta4yA3ryU"/>
<div class="relative z-10 p-10 h-full flex flex-col justify-between bg-gradient-to-t from-primary/80 to-transparent">
<div>
<span class="inline-block px-3 py-1 bg-primary-container text-on-primary-container text-[10px] font-label font-bold tracking-[0.15em] rounded-full mb-4">SYSTEM ACCESS</span>
<h2 class="text-4xl font-headline font-extrabold text-on-primary leading-tight tracking-tighter">Add New User</h2>
<p class="text-primary-fixed-dim mt-4 font-light text-lg leading-relaxed">Expand your dairy management team with granular role control.</p>
</div>
<div class="flex items-center gap-3">
<div class="p-2 bg-on-primary/10 rounded-lg backdrop-blur-md">
<span class="material-symbols-outlined text-on-primary" data-icon="shield_person">shield_person</span>
</div>
<span class="text-on-primary/80 text-sm font-medium">Secure Admin Gateway</span>
</div>
</div>
</div>
<!-- Right Column: Form -->
<div class="w-full md:w-7/12 p-8 md:p-12 flex flex-col justify-between">
<div class="space-y-8">
<!-- Section Header -->
<div class="space-y-1">
<h3 class="text-xs font-label font-bold text-outline tracking-[0.1em] uppercase">User Information</h3>
<p class="text-on-surface-variant text-sm">Enter the credentials and permissions for the new staff member.</p>
</div>
<!-- Form Fields -->
<form class="space-y-6"><!-- Full Name -->
<div>
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary text-sm font-medium placeholder:text-on-surface-variant/40" placeholder="e.g. Samuel Kibet" type="text"/>
</div>
</div>
<!-- Email Address -->
<div>
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary text-sm font-medium placeholder:text-on-surface-variant/40" placeholder="samuel.k@jukamdairy.com" type="email"/>
</div>
</div>
<!-- Two Column Dropdowns -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Select Role -->
<div>
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Select Role</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 appearance-none focus:ring-2 focus:ring-primary text-sm font-medium">
<option disabled="" selected="">Choose Role</option>
<option>General Manager</option>
<option>Veterinarian</option>
<option>Milker</option>
<option>Driver</option>
<option>Admin</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Access Level -->
<div>
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Access Level</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 appearance-none focus:ring-2 focus:ring-primary text-sm font-medium">
<option disabled="" selected="">Choose Level</option>
<option>Full Access</option>
<option>View Only</option>
<option>Editor</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div></form>
</div>
<!-- Footer Actions -->
<div class="p-8 border-t border-surface-container flex items-center justify-end gap-6 bg-surface-container-lowest">
<button class="text-stone-500 font-bold hover:text-stone-800 transition-colors px-4 py-2">Cancel</button>
<button class="bg-primary text-on-primary px-10 py-4 rounded-md font-bold shadow-lg hover:shadow-primary/20 hover:-translate-y-1 transition-all">
        Save User
    </button>
</div>
</div>
</div>
<!-- Close Backdrop Button -->
<button class="absolute top-8 right-8 text-on-surface/40 hover:text-on-surface transition-colors p-2 bg-white/10 rounded-full backdrop-blur-xl">
<span class="material-symbols-outlined text-3xl" data-icon="close">close</span>
</button>
</div>
</body></html>
