<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Work_Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      theme: {
        extend: {
          colors: {

            "on-background": "#1a1c19",
            "on-primary-container": "#cbffc2",
            "on-error": "#ffffff",
            "surface-container-highest": "#e3e3de",
            "error-container": "#ffdad6",
            "primary": "#206223",
            "on-primary-fixed": "#002203",
            "secondary": "#795900",
            "surface-container-high": "#e8e8e3",
            "background": "#fafaf5",
            "tertiary-container": "#387b41",
            "surface-variant": "#e3e3de",

            "inverse-surface": "#2f312e",
            "tertiary-fixed-dim": "#90d792",
            "on-surface-variant": "#40493d",
            "error": "#ba1a1a",
            "surface-dim": "#dadad5",
            "surface-container": "#eeeee9",
            "tertiary-fixed": "#abf4ac",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#1a1c19",
            "inverse-primary": "#91d78a"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Work Sans"],
            "label": ["Work Sans"]

          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .botanical-shadow {
      box-shadow: 0 24px 48px -12px rgba(26, 28, 25, 0.08);
    }
    .glass-effect {
      backdrop-filter: blur(12px);
      background-color: rgba(250, 250, 245, 0.8);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Underlying Login Screen (Blurred Content Context) -->
<main aria-hidden="true" class="min-h-screen flex items-center justify-center p-6 blur-md select-none pointer-events-none">
<div class="max-w-md w-full space-y-8">
<div class="text-center">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">JUKAM Dairy</h1>
<p class="mt-4 text-on-surface-variant font-medium">Welcome back to the pasture.</p>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl botanical-shadow space-y-6">
<div class="space-y-2">
<label class="block font-label text-xs font-bold tracking-wider text-on-surface-variant uppercase">Email Address</label>
<div class="w-full h-12 bg-surface-container-low rounded-md border border-outline-variant/20"></div>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-bold tracking-wider text-on-surface-variant uppercase">Password</label>
<div class="w-full h-12 bg-surface-container-low rounded-md border border-outline-variant/20"></div>
</div>
<div class="h-12 w-full bg-primary rounded-md"></div>
</div>
</div>
</main>
<!-- Password Reset Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 glass-effect">
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl botanical-shadow p-8 md:p-12 border border-outline-variant/10 relative">
<!-- Logo Header -->
<header class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">grass</span>
</div>
<h1 class="font-headline font-extrabold text-2xl tracking-tight text-primary">JUKAM Dairy</h1>
</header>
<!-- Content -->
<section class="text-center space-y-4 mb-8">
<h2 class="font-headline font-bold text-xl text-on-surface">Forgot Password?</h2>
<p class="text-on-surface-variant font-body text-sm leading-relaxed max-w-xs mx-auto">
          Enter the email address associated with your account and we'll send you a link to reset your password.
        </p>
</section>
<!-- Form -->
<form class="space-y-8" onsubmit="return false;">
<div class="space-y-2">
<label class="block font-label text-xs font-bold tracking-wider text-on-surface-variant uppercase" for="email">
            Email Address
          </label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant/30 rounded-md focus:ring-0 focus:border-primary transition-colors placeholder:text-on-surface-variant/40 text-on-surface font-body" id="email" name="email" placeholder="name@dairy.com" type="email"/>
</div>
</div>
<div class="space-y-4">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold rounded-md botanical-shadow hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200" type="submit">
            Reset Password
          </button>
<div class="pt-2 text-center">
<a class="inline-flex items-center gap-2 font-body text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
              Back to Login
            </a>
</div>
</div>
</form>
<!-- Decorative Background Detail (Subtle) -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-tertiary/5 rounded-full blur-3xl -z-10"></div>
<div class="absolute -bottom-12 -left-12 w-48 h-48 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</div>
</div>
<!-- Decorative Contextual Elements (Outside the blurred main but behind modal) -->
<div aria-hidden="true" class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-20 left-[10%] w-64 h-64 opacity-20">
<img class="w-full h-full object-cover rounded-full grayscale opacity-50" data-alt="Close-up of fresh green grass in a dairy pasture with soft morning dew and natural morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxhyPzOJUDu-PXCCc_5BFquaYFX_5b-bD9cfrQG40_nSI9fho5k4jBkWPBnM4AcnlNHXdBpcValwSz-XNlfCiroQh0f4AwTiU4Mt_EctrI8VPOY3ZotZw69U1BSA2sjy57OIYlpU_krz1d5_WWeprXcIxTwk3ac_KfZSyKJbMjgSkc8I5VHZSq7KA3gaJx6Vo4XBw18cmvJ-XlWrgxYPJSqRr_JQ_IzVldKKBJ6JNGmbjHYIGIUzAfG2whDyPZwjh77EdGk8YVhBwt"/>
</div>
<div class="absolute bottom-20 right-[10%] w-80 h-80 opacity-10">
<img class="w-full h-full object-cover rounded-full grayscale" data-alt="Wide landscape of a rolling green dairy farm with a traditional barn under a warm golden sunset sky" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3DN-kNbT-tbZqTi60MEYeGiG0bPhCjbBtgQLlmnthvH0gWSYTe0HIPqJCvfW8Z1v-QOxdrH9cmseDn5bVQRpV4CsImughqw869dpB24QYnqUE1ct2O79zlV6XoVZtIhXiW5h-k75EsYlderM0fQtu1zfOF6_uQIyb5dljl9xOSssemFlAAq0CqN8RfXSYtEpiZRLlCOwoV82ppplkuzNhmhdUnM-hw_cdafWZWOlUAumm5YgMAsikEv0EAQqPPbQm8c5hXfIBi75B"/>
</div>
</div>
</body></html>
